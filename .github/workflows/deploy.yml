name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: 🧪 Test .NET API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./backend/GitVisualizer.slnx

      - name: Build
        run: dotnet build ./backend/GitVisualizer.slnx --no-restore

      - name: Run Tests
        run: dotnet test ./backend/GitVisualizer.slnx --no-build --verbosity normal

  test-frontend:
    name: 🧪 Test Angular App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build Angular
        run: npm run build
        working-directory: ./frontend

  build-and-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gitvisualizer-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gitvisualizer-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  summary:
    name: ✅ Pipeline Summary
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Success
        run: |
          echo "🎉 Pipeline completed successfully!"
          echo "✅ Backend tested and built"
          echo "✅ Frontend tested and built"
          echo "✅ Docker images pushed to Docker Hub"